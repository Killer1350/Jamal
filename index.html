<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jamal's Suya & Shawarma</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;--card:#141414;--accent:#c4161c;--accent2:#f5c16c;
  --text:#f5f5f5;--muted:#9ca3af;
}
*{box-sizing:border-box;font-family:Poppins}
body{margin:0;background:var(--bg);color:var(--text)}

header{
  position:sticky;top:0;z-index:50;
  background:#000c;backdrop-filter:blur(10px);
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 22px;border-bottom:1px solid #ffffff10
}
.logo-img{width:80px;border-radius:50%}
nav a{color:white;margin-left:18px;text-decoration:none;font-weight:500}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer}
.hamburger span{width:28px;height:3px;background:white;border-radius:3px}

@media(max-width:768px){
  .hamburger{display:flex}
  nav{display:none;position:fixed;top:70px;left:0;width:100%;background:#000d;flex-direction:column}
  nav.active{display:flex}
  nav a{padding:14px 22px;border-bottom:1px solid #ffffff10}
}

.hero{
  padding:90px 20px;text-align:center;
  background:linear-gradient(#000a,#000d),
  url("https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg") center/cover;
  border-bottom-left-radius:40px;border-bottom-right-radius:40px
}
.hero h1{font-size:44px;color:var(--accent2);font-weight:800}

.btn-main{
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  border:none;padding:12px 28px;border-radius:30px;
  font-weight:700;cursor:pointer
}

.categories{position:sticky;top:70px;background:#0b0b0b;padding:12px 0}
.category-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px}
.category-item{
  padding:10px 16px;border-radius:999px;background:#1a1a1a;
  cursor:pointer;font-weight:600;white-space:nowrap
}
.category-item.active{background:linear-gradient(135deg,#c81d25,#fcbf49);color:black}

.controls{padding:16px;display:flex;gap:10px;flex-wrap:wrap}
.controls input,.controls select{
  background:#111;border:1px solid #ffffff10;padding:10px 14px;
  border-radius:14px;color:white;flex:1
}

.menu-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;padding:16px
}
.menu-card{background:var(--card);border-radius:16px;padding:12px}
.menu-card img{width:100%;height:160px;object-fit:cover;border-radius:12px}
.price{color:var(--accent2);font-weight:700}

.whatsapp-btn{
  background:#25d366;border:none;padding:9px;border-radius:12px;
  width:100%;font-weight:700;margin-top:6px
}

#cartBox{
  position:fixed;right:20px;bottom:20px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  padding:14px 26px;border-radius:50px;font-weight:800;
  cursor:pointer;z-index:60
}

.modal-backdrop{
  position:fixed;inset:0;background:#000c;
  display:none;justify-content:center;align-items:center
}
.modal-box{
  background:#111;padding:22px;border-radius:20px;
  width:90%;max-width:400px
}
.qty-btn{
  padding:4px 10px;border-radius:8px;
  border:none;background:#333;color:white
}
.remove-btn{color:#c4161c;font-weight:700;cursor:pointer}
</style>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <img src="images/jamal-logo.png" class="logo-img">
    <div>
      <b>Jamal’s Suya & Shawarma</b><br>
      <small style="color:var(--muted)">Premium Eatery</small>
    </div>
  </div>

  <nav id="navMenu">
    <a href="#menuList" onclick="closeMenu()">Menu</a>
    <a href="#about" onclick="closeMenu()">About</a>
  </nav>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</header>

<section class="hero">
  <h1>Luxury taste.<br>Fast delivery.</h1>
  <button class="btn-main" onclick="scrollToMenu()">Browse Menu</button>
</section>

<section class="categories">
  <div class="category-scroll" id="catTabs"></div>
</section>

<section class="controls">
  <input id="q" placeholder="Search meals…" oninput="renderMenu()">
  <select id="sort" onchange="renderMenu()">
    <option value="default">Featured</option>
    <option value="price-asc">Low → High</option>
    <option value="price-desc">High → Low</option>
  </select>
</section>

<section id="menuList" class="menu-grid"></section>

<div id="cartBox" onclick="openCart()">Cart (0)</div>

<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal-box" id="cartModalBox"></div>
</div>

<footer id="about" style="text-align:center;padding:30px;color:#9ca3af">
  © Jamal’s Suya & Shawarma
</footer>

<script>
const WHATSAPP_NUMBER="2348032296993";

const CATEGORIES=["All","Suya","Shawarma","Burger","Loaded Loaf","Jambalaya","Drinks"];

const MENU=[
 {id:1,name:"Beef Suya Platter",price:4500,cat:"Suya",img:"https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg"},
 {id:2,name:"Chicken Shawarma",price:3000,cat:"Shawarma",img:"https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg"},
 {id:3,name:"Double Beef Burger",price:3500,cat:"Burger",img:"https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg"},
 {id:4,name:"Loaded Chicken Loaf",price:2800,cat:"Loaded Loaf",img:"https://images.pexels.com/photos/704569/pexels-photo-704569.jpeg"},
 {id:5,name:"Seafood Jambalaya",price:5000,cat:"Jambalaya",img:"https://images.pexels.com/photos/410648/pexels-photo-410648.jpeg"},
 {id:6,name:"Chilled Fruit Drink",price:1800,cat:"Drinks",img:"https://images.pexels.com/photos/1099680/pexels-photo-1099680.jpeg"}
];

let CART=[];
let activeCat="All";

function toggleMenu(){navMenu.classList.toggle("active")}
function closeMenu(){navMenu.classList.remove("active")}
function scrollToMenu(){menuList.scrollIntoView({behavior:"smooth"})}

function loadCategories(){
  catTabs.innerHTML="";
  CATEGORIES.forEach(c=>{
    catTabs.innerHTML+=`<div class="category-item ${c===activeCat?"active":""}" onclick="setCat('${c}')">${c}</div>`;
  });
}

function setCat(c){activeCat=c;loadCategories();renderMenu()}

function renderMenu(){
  let q=document.getElementById("q").value.toLowerCase();
  let sort=document.getElementById("sort").value;

  let items=MENU.filter(i=>
    i.name.toLowerCase().includes(q) &&
    (activeCat==="All"||i.cat===activeCat)
  );

  if(sort==="price-asc")items.sort((a,b)=>a.price-b.price);
  if(sort==="price-desc")items.sort((a,b)=>b.price-a.price);

  menuList.innerHTML="";
  items.forEach(i=>{
    menuList.innerHTML+=`
    <div class="menu-card">
      <img src="${i.img}">
      <h5>${i.name}</h5>
      <div class="price">₦${i.price}</div>
      <button class="btn-main" onclick="addToCart(${i.id})">Add to Cart</button>
      <button class="whatsapp-btn" onclick="orderWhatsapp('${i.name}',${i.price})">Order via WhatsApp</button>
    </div>`;
  });
}

function addToCart(id){
  let item=CART.find(i=>i.id===id);
  if(item)item.qty++; else CART.push({id,qty:1});
  updateCartCount();
}

function updateCartCount(){
  cartBox.innerText=`Cart (${CART.reduce((a,b)=>a+b.qty,0)})`;
}

function changeQty(id,d){
  let i=CART.find(x=>x.id===id);
  i.qty+=d;
  if(i.qty<=0)CART=CART.filter(x=>x.id!==id);
  openCart();updateCartCount();
}

function removeItem(id){
  CART=CART.filter(x=>x.id!==id);
  openCart();updateCartCount();
}

function openCart(){
  modalBackdrop.style.display="flex";
  let total=0,html="<h4>Your Cart</h4>";
  CART.forEach(c=>{
    let m=MENU.find(i=>i.id===c.id);
    let sub=m.price*c.qty; total+=sub;
    html+=`
    <div>
      <b>${m.name}</b><br>
      ₦${m.price} × ${c.qty} = ₦${sub}<br>
      <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
      <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
      <span class="remove-btn" onclick="removeItem(${c.id})"> Remove</span>
    </div><hr>`;
  });
  html+=`<b>Total: ₦${total}</b><br><br>
  <button class="btn-main" onclick="checkoutWhatsapp(${total})">Checkout via WhatsApp</button>
  <button class="btn-main" style="background:#c4161c;margin-top:8px" onclick="clearCart()">Clear Cart</button>
  <button class="btn-main" style="background:#333;margin-top:8px" onclick="closeModal()">Close</button>`;
  cartModalBox.innerHTML=html;
}

function clearCart(){CART=[];updateCartCount();closeModal()}
function closeModal(){modalBackdrop.style.display="none"}

function orderWhatsapp(n,p){
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`Hello! I want ${n} — ₦${p}`)}`);
}

function checkoutWhatsapp(t){
  let msg="Hello! I want to place an order:\n\n";
  CART.forEach(c=>{
    let m=MENU.find(i=>i.id===c.id);
    msg+=`• ${m.name} × ${c.qty} — ₦${m.price*c.qty}\n`;
  });
  msg+=`\nTOTAL: ₦${t}`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
}

loadCategories();renderMenu();
</script>

</body>
</html>
